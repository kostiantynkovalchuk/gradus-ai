<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СОЛОМОН — Пошук практики ВС</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #ffffff;
    --bg-subtle:   #f7f5f0;
    --bg-card:     #ffffff;
    --navy:        #0d1528;
    --navy-mid:    #1e2d4a;
    --navy-light:  #2e4270;
    --gold:        #b8892a;
    --gold-light:  #d4a040;
    --gold-dim:    #b8892a14;
    --gold-border: #b8892a30;
    --border:      #e4ddd0;
    --border-mid:  #cdc5b4;
    --text:        #0d1528;
    --text-mid:    #3a4d6e;
    --text-muted:  #7a8fa8;
    --text-dim:    #aab5c3;
    --accent-red:  #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Top rule */
  body::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 50%, var(--navy) 100%);
  }

  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 52px 28px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 52px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrap {
    flex-shrink: 0;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrap img {
    width: 72px;
    height: 72px;
    display: block;
  }

  .header-text { flex: 1; }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--navy);
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-badge {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1px solid var(--gold-border);
    border-radius: 4px;
    background: var(--gold-dim);
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── Search ── */
  .search-section {
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .search-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .search-wrap {
    display: flex;
    border: 1.5px solid var(--border-mid);
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--bg);
    margin-bottom: 14px;
  }

  .search-wrap:focus-within {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px #0d152810;
  }

  input[type=text] {
    flex: 1;
    padding: 15px 20px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14.5px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    outline: none;
  }

  input[type=text]::placeholder { color: var(--text-dim); }

  .search-btn {
    padding: 0 28px;
    background: var(--navy);
    color: #fff;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover { background: var(--navy-light); }
  .search-btn:disabled {
    background: var(--border-mid);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  /* ── Chips ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
    align-self: center;
  }

  .chip {
    padding: 5px 13px;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-mid);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    border-color: var(--navy);
    background: var(--navy);
    color: #fff;
  }

  /* ── Results ── */
  .results-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  .results-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--navy);
  }

  .results-sub {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 22px 24px;
    margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.3s ease both;
  }

  .card:hover {
    border-color: var(--border-mid);
    box-shadow: 0 4px 20px #0d152808;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    gap: 12px;
  }

  .case-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
  }

  .case-date {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .judge {
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .judge::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }

  .summary-text {
    font-size: 13.5px;
    color: var(--text-mid);
    line-height: 1.7;
    padding: 12px 16px;
    background: var(--bg-subtle);
    border-left: 2px solid var(--gold);
    border-radius: 0 6px 6px 0;
    margin-bottom: 14px;
    font-style: italic;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .read-link {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .read-link:hover { color: var(--navy); }

  .read-link::after {
    content: '→';
    transition: transform 0.15s;
  }

  .read-link:hover::after { transform: translateX(3px); }

  /* ── States ── */
  .status {
    text-align: center;
    padding: 56px 0;
  }

  .loading-dots span {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--navy);
    border-radius: 50%;
    margin: 0 3px;
    animation: dot 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { transform: scale(0.5); opacity: 0.2; }
    40% { transform: scale(1); opacity: 1; }
  }

  .status-label {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .empty-state {
    text-align: center;
    padding: 56px 0;
    color: var(--text-muted);
    font-size: 14px;
  }

  .error-msg {
    padding: 20px 24px;
    background: #fdf2f2;
    border: 1px solid #f5c6c6;
    border-radius: 8px;
    color: var(--accent-red);
    font-size: 13.5px;
  }

  /* ── Footer ── */
  footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    h1 { font-size: 28px; }
    .header-badge { display: none; }
    header { gap: 16px; }
    .logo-wrap, .logo-wrap img { width: 52px; height: 52px; }
  }
</style>
</head>

    </div>
    <div class="header-text">
      <h1>Соломон</h1>
      <p class="tagline">Верховний Суд України · Касаційна практика</p>
    </div>
    <div class="header-badge">AI-пошук</div>
  </header>

  <div class="search-section">
    <div class="search-label">Запит природною мовою</div>
    <div class="search-wrap">
      <input type="text" id="query"
        placeholder="Наприклад: скасування ППР нереальність операцій 2024-2025" />
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Шукати</button>
    </div>
    <div class="chips">
      <span class="chip-label">Приклади:</span>
      <button class="chip" onclick="setQuery(this)">скасування ППР нереальність операцій</button>
      <button class="chip" onclick="setQuery(this)">АМКУ антиконкурентні дії господарські</button>
      <button class="chip" onclick="setQuery(this)">стягнення збитків ДТП таксі</button>
      <button class="chip" onclick="setQuery(this)">маркетинг документальна перевірка</button>
    </div>
  </div>

  <div id="results"></div>

  <footer>
    <span>СОЛОМОН · Тільки для авторизованих користувачів</span>
    <span>Касація · ВС України</span>
  </footer>
</div>

<script>
function setQuery(el) {
  document.getElementById('query').value = el.textContent;
  doSearch();
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('searchBtn');
  const out = document.getElementById('results');

  btn.disabled = true;
  btn.textContent = '…';
  out.innerHTML = `
    <div class="status">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="status-label">Аналізую запит та шукаю рішення</div>
    </div>`;

  try {
    const resp = await fetch('/law/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, summarize: true })
    });
    if (!resp.ok) throw new Error('Помилка сервера');
    const data = await resp.json();

    if (!data.results?.length) {
      out.innerHTML = `<div class="empty-state">
        Нічого не знайдено.<br>
        <span style="font-size:12px; color:var(--text-dim); margin-top:6px; display:block;">
          Спробуйте змінити формулювання або розширити часовий діапазон
        </span>
      </div>`;
      return;
    }

    let html = `<div class="results-meta">
      <span class="results-count">${data.count}</span>
      <span class="results-sub">рішень · Верховний Суд · Касація</span>
    </div>`;

    data.results.forEach((j, i) => {
      const date = (j.adjudication_date || '').substring(0,10);
      const cause = j.cause_number || '—';
      const judge = j.judge || '—';
      const link = j.link || '#';
      const summary = j.summary || '';
      html += `
        <div class="card" style="animation-delay:${i*0.07}s">
          <div class="card-top">
            <div class="case-num">Справа № ${cause}</div>
            <div class="case-date">${date}</div>
          </div>
          <div class="judge">${judge}</div>
          ${summary ? `<div class="summary-text">${summary}</div>` : ''}
          <div class="card-footer">
            <a class="read-link" href="${link}" target="_blank">Читати повністю</a>
          </div>
        </div>`;
    });

    out.innerHTML = html;
  } catch(err) {
    out.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Шукати';
  }
}
</script>
</body>
</html>
