<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>СОЛОМОН — Правова аналітика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #ffffff;
    --bg-subtle:   #f7f5f0;
    --bg-card:     #ffffff;
    --navy:        #0d1528;
    --navy-mid:    #1e2d4a;
    --navy-light:  #2e4270;
    --gold:        #b8892a;
    --gold-light:  #d4a040;
    --gold-dim:    #b8892a14;
    --gold-border: #b8892a30;
    --border:      #e4ddd0;
    --border-mid:  #cdc5b4;
    --text:        #0d1528;
    --text-mid:    #3a4d6e;
    --text-muted:  #7a8fa8;
    --text-dim:    #aab5c3;
    --accent-red:  #c0392b;
    --sev-critical:#c0392b;
    --sev-high:    #e06c00;
    --sev-medium:  #b8892a;
    --sev-low:     #3a4d6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--navy) 0%, var(--gold) 50%, var(--navy) 100%);
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 52px 28px 80px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrap { flex-shrink: 0; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
  .logo-wrap img { width: 64px; height: 64px; display: block; }
  .header-text { flex: 1; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 700;
    letter-spacing: 5px; color: var(--navy);
    text-transform: uppercase; line-height: 1; margin-bottom: 4px;
  }
  .tagline { font-size: 11px; font-weight: 400; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-badge {
    flex-shrink: 0; padding: 6px 14px; border: 1px solid var(--gold-border);
    border-radius: 4px; background: var(--gold-dim); font-size: 11px;
    color: var(--gold); font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* ── Tab navigation ── */
  .tab-nav {
    display: flex; gap: 0; margin-bottom: 36px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 12px 24px; background: transparent; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -2px; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--navy); }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); font-weight: 600; }

  /* ── Tab panels ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeUp 0.25s ease both; }

  /* ── Court search (existing styles) ── */
  .search-section { margin-bottom: 40px; animation: fadeUp 0.6s 0.1s ease both; }
  .search-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .search-wrap {
    display: flex; border: 1.5px solid var(--border-mid);
    border-radius: 8px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--bg); margin-bottom: 14px;
  }
  .search-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px #0d152810; }
  input[type=text] {
    flex: 1; padding: 15px 20px; background: transparent; border: none;
    color: var(--text); font-size: 14.5px; font-family: 'DM Sans', sans-serif;
    font-weight: 300; outline: none;
  }
  input[type=text]::placeholder { color: var(--text-dim); }
  .search-btn {
    padding: 0 28px; background: var(--navy); color: #fff; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    transition: background 0.2s; white-space: nowrap;
  }
  .search-btn:hover { background: var(--navy-light); }
  .search-btn:disabled { background: var(--border-mid); color: var(--text-dim); cursor: not-allowed; }

  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-right: 4px; align-self: center; }
  .chip {
    padding: 5px 13px; background: var(--bg-subtle); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-mid); font-size: 12px;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { border-color: var(--navy); background: var(--navy); color: #fff; }

  .results-meta { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .results-count { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--navy); }
  .results-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 22px 24px; margin-bottom: 10px;
    transition: border-color 0.15s, box-shadow 0.15s; animation: fadeUp 0.3s ease both;
  }
  .card:hover { border-color: var(--border-mid); box-shadow: 0 4px 20px #0d152808; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 12px; }
  .case-num { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--navy); }
  .case-date { font-size: 12px; color: var(--text-dim); white-space: nowrap; padding-top: 2px; flex-shrink: 0; }
  .judge { font-size: 12.5px; color: var(--text-muted); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
  .judge::before { content: ''; display: inline-block; width: 16px; height: 1px; background: var(--gold); flex-shrink: 0; }
  .summary-text {
    font-size: 13.5px; color: var(--text-mid); line-height: 1.7;
    padding: 12px 16px; background: var(--bg-subtle); border-left: 2px solid var(--gold);
    border-radius: 0 6px 6px 0; margin-bottom: 14px; font-style: italic;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .read-link { font-size: 12px; color: var(--text-muted); text-decoration: none; letter-spacing: 0.5px; transition: color 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .read-link:hover { color: var(--navy); }
  .read-link::after { content: '→'; transition: transform 0.15s; }
  .read-link:hover::after { transform: translateX(3px); }

  /* ── Shared state styles ── */
  .status { text-align: center; padding: 56px 0; }
  .loading-dots span { display: inline-block; width: 7px; height: 7px; background: var(--navy); border-radius: 50%; margin: 0 3px; animation: dot 1.2s ease-in-out infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.2; } 40% { transform: scale(1); opacity: 1; } }
  .status-label { margin-top: 14px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
  .empty-state { text-align: center; padding: 56px 0; color: var(--text-muted); font-size: 14px; }
  .error-msg { padding: 20px 24px; background: #fdf2f2; border: 1px solid #f5c6c6; border-radius: 8px; color: var(--accent-red); font-size: 13.5px; }

  /* ── Contracts tab ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    font-weight: 600; color: var(--navy);
  }
  .btn {
    padding: 8px 18px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; border: none;
  }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-secondary { background: var(--bg-subtle); color: var(--text-mid); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--navy); color: var(--navy); }
  .btn-danger { background: #fdf2f2; color: var(--accent-red); border: 1px solid #f5c6c6; }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: var(--gold-light); }

  .eng-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 18px 22px; margin-bottom: 10px; cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .eng-card:hover { border-color: var(--gold-border); box-shadow: 0 4px 16px #0d152808; }
  .eng-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .eng-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--navy); }
  .eng-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .eng-meta span::before { content: '· '; }
  .eng-meta span:first-child::before { content: ''; }

  .status-badge {
    font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px; white-space: nowrap;
  }
  .status-triage       { background: #f0f4ff; color: var(--navy-light); }
  .status-under_review { background: #fff8e1; color: #b8892a; }
  .status-protocol_drafted { background: #e8f5e9; color: #2e7d32; }
  .status-protocol_sent    { background: #e3f2fd; color: #1565c0; }
  .status-agreed           { background: #e8f5e9; color: #1b5e20; }
  .status-declined         { background: #fdf2f2; color: #c0392b; }
  .status-archived         { background: var(--bg-subtle); color: var(--text-dim); }
  .status-counterparty_responded { background: #f3e5f5; color: #6a1b9a; }

  /* severity badges */
  .sev { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; }
  .sev-critical { background: #fdf2f2; color: var(--sev-critical); }
  .sev-high     { background: #fff3e0; color: var(--sev-high); }
  .sev-medium   { background: #fef9e7; color: var(--sev-medium); }
  .sev-low      { background: #eaf1f8; color: var(--sev-low); }

  /* finding card */
  .finding-card {
    border: 1px solid var(--border); border-radius: 6px; padding: 14px 18px;
    margin-bottom: 8px; background: var(--bg-card);
  }
  .finding-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .finding-ref { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; color: var(--navy); }
  .finding-note { font-size: 13.5px; color: var(--text-mid); line-height: 1.65; margin-bottom: 10px; }
  .finding-alt {
    font-size: 12.5px; color: var(--text-mid); padding: 10px 14px;
    background: var(--bg-subtle); border-left: 2px solid var(--gold); border-radius: 0 4px 4px 0;
    margin-bottom: 8px; font-style: italic;
  }
  .finding-ai-tag { font-size: 10px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px; }
  .finding-ungrounded { font-size: 11px; color: var(--accent-red); background: #fdf2f2; padding: 4px 10px; border-radius: 3px; }
  .finding-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border-mid); border-radius: 10px; padding: 40px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    background: var(--bg-subtle);
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: var(--gold-dim); }
  .upload-zone-label { font-size: 13px; color: var(--text-muted); margin-top: 10px; }

  /* Modal backdrop */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: #0d152860;
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: 10px; padding: 32px;
    max-width: 520px; width: 90%; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px #0d152830;
    animation: fadeUp 0.2s ease both;
  }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 20px; }
  .form-row { margin-bottom: 16px; }
  .form-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border-mid);
    border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 13.5px;
    color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--navy); }

  /* workspace */
  .workspace-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 28px;
    padding-bottom: 18px; border-bottom: 1px solid var(--border);
  }
  .workspace-back { cursor: pointer; color: var(--text-muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.15s; }
  .workspace-back:hover { color: var(--navy); }
  .workspace-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--navy); }

  .doc-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border: 1px solid var(--border); border-radius: 6px;
    margin-bottom: 8px; background: var(--bg-card);
  }
  .doc-name { font-size: 13.5px; color: var(--navy); font-weight: 500; }
  .doc-type { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .doc-analyzed { font-size: 11px; color: #2e7d32; margin-top: 2px; }
  .doc-pending { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .kpi-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .kpi { flex: 1; min-width: 100px; background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .kpi-val { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
  .kpi-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

  .disclaimer {
    font-size: 11px; color: var(--text-dim); padding: 12px 16px;
    background: var(--bg-subtle); border-radius: 6px; border-left: 2px solid var(--border-mid);
    margin-top: 20px; font-style: italic;
  }

  /* ── Footer ── */
  footer {
    margin-top: 64px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
  }

  /* ── Animations ── */
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(8px);  } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    h1 { font-size: 26px; }
    .header-badge { display: none; }
    header { gap: 16px; }
    .logo-wrap, .logo-wrap img { width: 48px; height: 48px; }
    .tab-btn { padding: 10px 14px; font-size: 11px; }
    .modal { padding: 20px; }
    .kpi-row { gap: 8px; }
    .kpi-val { font-size: 22px; }
  }
</style>
</head>

    </div>
    <div class="header-text">
      <h1>Соломон</h1>
      <p class="tagline">Правова аналітика · AVTD</p>
    </div>
    <div class="header-badge">AI-аналіз</div>
  </header>

  <!-- Tab navigation -->
  <div class="tab-nav">
    <button class="tab-btn" id="tab-court-btn" onclick="switchTab('court')">⚖ Судова практика</button>
    <button class="tab-btn" id="tab-contracts-btn" onclick="switchTab('contracts')">📄 Договори поставки</button>
  </div>

  <!-- ═══ TAB 1: Court search ═══ -->
  <div class="tab-panel" id="tab-court">
    <div class="search-section">
      <div class="search-label">Запит природною мовою</div>
      <div class="search-wrap">
        <input type="text" id="query" placeholder="Наприклад: скасування ППР нереальність операцій 2024-2025" />
        <button class="search-btn" id="searchBtn" onclick="doSearch()">Шукати</button>
      </div>
      <div class="chips">
        <span class="chip-label">Приклади:</span>
        <button class="chip" onclick="setQuery(this)">скасування ППР нереальність операцій</button>
        <button class="chip" onclick="setQuery(this)">АМКУ антиконкурентні дії господарські</button>
        <button class="chip" onclick="setQuery(this)">стягнення збитків ДТП таксі</button>
        <button class="chip" onclick="setQuery(this)">маркетинг документальна перевірка</button>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <!-- ═══ TAB 2: Contracts ═══ -->
  <div class="tab-panel" id="tab-contracts">
    <div id="contracts-root"></div>
  </div>

  <footer>
    <span>СОЛОМОН · Тільки для авторизованих користувачів</span>
    <span>AVTD · Правовий відділ</span>
  </footer>
</div>

<!-- New engagement modal -->
<div class="modal-backdrop" id="new-eng-modal">
  <div class="modal">
    <div class="modal-title">Нова справа</div>
    <div class="form-row">
      <label class="form-label">Назва справи *</label>
      <input class="form-input" id="eng-name" placeholder="Договір поставки — Levays 2026">
    </div>
    <div class="form-row">
      <label class="form-label">Контрагент (Покупець)</label>
      <input class="form-input" id="eng-counterparty" placeholder="ТОВ «Назва»">
    </div>
    <div class="form-row">
      <label class="form-label">Наша юридична особа</label>
      <input class="form-input" id="eng-entity" value="AVTD">
    </div>
    <div class="form-row">
      <label class="form-label">Дата договору</label>
      <input class="form-input" id="eng-date" type="date">
    </div>

      <button class="btn btn-secondary" onclick="closeModal('new-eng-modal')">Скасувати</button>
      <button class="btn btn-primary" onclick="createEngagement()">Створити</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
//  TAB ROUTER
// ══════════════════════════════════════════════════════════════
const QP = new URLSearchParams(window.location.search);
let _currentTab = QP.get('tab') || 'court';
let _currentView = QP.get('view') || '';

function switchTab(tab) {
  _currentTab = tab;
  _currentView = '';
  history.pushState({}, '', '?tab=' + tab);
  document.getElementById('tab-court').classList.toggle('active', tab === 'court');
  document.getElementById('tab-contracts').classList.toggle('active', tab === 'contracts');
  document.getElementById('tab-court-btn').classList.toggle('active', tab === 'court');
  document.getElementById('tab-contracts-btn').classList.toggle('active', tab === 'contracts');
  if (tab === 'contracts') renderContractsList();
}

function navigateTo(view, pushState = true) {
  _currentView = view;
  if (pushState) history.pushState({}, '', '?tab=contracts&view=' + encodeURIComponent(view));
  renderContractsView(view);
}

window.addEventListener('popstate', () => {
  const p = new URLSearchParams(window.location.search);
  const t = p.get('tab') || 'court';
  const v = p.get('view') || '';
  if (t !== _currentTab) switchTab(t);
  else if (v !== _currentView) { _currentView = v; renderContractsView(v); }
});

// ══════════════════════════════════════════════════════════════
//  COURT SEARCH (existing)
// ══════════════════════════════════════════════════════════════
function setQuery(el) {
  document.getElementById('query').value = el.textContent;
  doSearch();
}

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  const btn = document.getElementById('searchBtn');
  const out = document.getElementById('results');
  btn.disabled = true; btn.textContent = '…';
  out.innerHTML = `<div class="status"><div class="loading-dots"><span></span><span></span><span></span></div><div class="status-label">Аналізую запит та шукаю рішення</div></div>`;
  try {
    const resp = await fetch('/law/search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, summarize: true })
    });
    if (!resp.ok) throw new Error('Помилка сервера');
    const data = await resp.json();
    if (!data.results?.length) {
      out.innerHTML = `<div class="empty-state">Нічого не знайдено.<br><span style="font-size:12px;color:var(--text-dim);margin-top:6px;display:block;">Спробуйте змінити формулювання або розширити часовий діапазон</span></div>`;
      return;
    }
    let html = `<div class="results-meta"><span class="results-count">${data.count}</span><span class="results-sub">рішень · Верховний Суд · Касація</span></div>`;
    data.results.forEach((j, i) => {
      const date = (j.adjudication_date || '').substring(0,10);
      const cause = j.cause_number || '—'; const judge = j.judge || '—';
      const link = j.link || '#'; const summary = j.summary || '';
      html += `<div class="card" style="animation-delay:${i*0.07}s">
        <div class="card-top"><div class="case-num">Справа № ${cause}</div><div class="case-date">${date}</div></div>
        <div class="judge">${judge}</div>
        ${summary ? `<div class="summary-text">${summary}</div>` : ''}
        <div class="card-footer"><a class="read-link" href="${link}" target="_blank">Читати повністю</a></div>
      </div>`;
    });
    out.innerHTML = html;
  } catch(err) {
    out.innerHTML = `<div class="error-msg">⚠ ${err.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Шукати';
  }
}

// ══════════════════════════════════════════════════════════════
//  CONTRACTS SPA
// ══════════════════════════════════════════════════════════════
let _engagements = [];
let _currentEng = null;

function renderContractsView(view) {
  if (!view || view === 'list') renderContractsList();
  else if (view === 'new') renderContractsList();
  else if (view.startsWith('e/')) renderEngagementWorkspace(parseInt(view.slice(2)));
  else if (view === 'buyers') renderBuyerProfiles();
  else if (view === 'admin/eval') renderEvalPage();
  else if (view === 'admin/audit') renderAuditPage();
  else renderContractsList();
}

async function renderContractsList() {
  const root = document.getElementById('contracts-root');
  root.innerHTML = loadingHtml('Завантаження справ…');
  try {
    const r = await fetch('/api/contracts/engagements');
    if (r.status === 401) { root.innerHTML = authPromptHtml(); return; }
    _engagements = await r.json();
    let html = `<div class="section-header">
      <div class="section-title">Справи з договорів</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="navigateTo('buyers')">Покупці</button>
        <button class="btn btn-secondary btn-sm" onclick="navigateTo('admin/eval')">Оцінка</button>
        <button class="btn btn-primary btn-sm" onclick="openModal('new-eng-modal')">+ Нова справа</button>
      </div>
    </div>`;
    if (!_engagements.length) {
      html += `<div class="empty-state">Справ немає. Створіть першу.</div>`;
    } else {
      _engagements.forEach(e => {
        const statusLabel = statusBadge(e.status);
        html += `<div class="eng-card" onclick="navigateTo('e/${e.id}')">
          <div class="eng-header">
            <div class="eng-name">${esc(e.name)}</div>
            ${statusLabel}
          </div>
          <div class="eng-meta">
            <span>${esc(e.counterparty_name || '—')}</span>
            <span>${e.doc_count || 0} документів</span>
            <span>${e.finding_count || 0} ризиків</span>
            <span>${fmtDate(e.created_at)}</span>
          </div>
        </div>`;
      });
    }
    html += `<div class="disclaimer">Автоматичний аналіз Solomon. Підлягає перевірці юристом. Не є юридичною консультацією.</div>`;
    root.innerHTML = html;
  } catch(e) {
    root.innerHTML = errorHtml(e.message);
  }
}

async function renderEngagementWorkspace(eid) {
  const root = document.getElementById('contracts-root');
  root.innerHTML = loadingHtml('Завантаження справи…');
  try {
    const r = await fetch('/api/contracts/engagements/' + eid);
    if (!r.ok) throw new Error('Справу не знайдено');
    const data = await r.json();
    _currentEng = data;
    const eng = data.engagement;
    const docs = data.documents || [];
    const findings = data.findings || [];
    const sevSum = data.severity_summary || {};

    let html = `<div class="workspace-header">
      <span class="workspace-back" onclick="navigateTo('list')">← Список справ</span>
      <div>
        <div class="workspace-title">${esc(eng.name)}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${esc(eng.counterparty_name||'—')} · ${statusBadge(eng.status)}</div>
      </div>
    </div>`;

    // KPIs
    html += `<div class="kpi-row">
      <div class="kpi"><div class="kpi-val">${docs.length}</div><div class="kpi-label">Документів</div></div>
      <div class="kpi"><div class="kpi-val">${findings.length}</div><div class="kpi-label">Ризиків</div></div>
      <div class="kpi" style="background:#fdf2f2"><div class="kpi-val" style="color:var(--sev-critical)">${sevSum.critical||0}</div><div class="kpi-label">Критичних</div></div>
      <div class="kpi" style="background:#fff3e0"><div class="kpi-val" style="color:var(--sev-high)">${sevSum.high||0}</div><div class="kpi-label">Високих</div></div>
    </div>`;

    // Documents section
    html += `<div class="section-header" style="margin-top:24px">
      <div class="section-title" style="font-size:16px">Документи</div>
      <button class="btn btn-secondary btn-sm" onclick="openUploadPanel(${eid})">+ Завантажити</button>
    </div>`;
    if (!docs.length) {
      html += `<div class="empty-state" style="padding:30px 0">Завантажте документи для аналізу</div>`;
    } else {
      docs.forEach(d => {
        const analyzed = d.analyzed_at ? `<div class="doc-analyzed">Проаналізовано ${fmtDate(d.analyzed_at)}</div>` : `<div class="doc-pending">Не проаналізовано</div>`;
        html += `<div class="doc-list-item">
          <div>
            <div class="doc-name">${esc(d.original_filename)}</div>
            <div class="doc-type">${docTypeLabel(d.document_type)}</div>
            ${analyzed}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="setIncludeAll(${d.id}, ${findings.filter(f=>f.document_id===d.id&&f.workflow_state==='triage').length > 0})">Протокол</button>
          </div>
        </div>`;
      });
    }

    // Analyze button
    const unanalyzed = docs.filter(d => !d.analyzed_at && ['main_contract','additional_agreement'].includes(d.document_type));
    if (unanalyzed.length) {
      html += `<div style="margin:16px 0">
        <button class="btn btn-gold" onclick="startAnalysis(${eid})">🔍 Запустити аналіз (${unanalyzed.length} документ${unanalyzed.length===1?'':'ів'})</button>
        <span style="font-size:11px;color:var(--text-muted);margin-left:12px">~60-120 секунд</span>
      </div>`;
    }

    // Findings
    if (findings.length) {
      html += `<div class="section-header" style="margin-top:28px">
        <div class="section-title" style="font-size:16px">Ризики</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="downloadRiskNote(${eid})">↓ Ризики DOCX</button>
          <button class="btn btn-secondary btn-sm" onclick="genOpinion(${eid})">Правовий висновок</button>
        </div>
      </div>`;

      findings.forEach(f => {
        const altHtml = f.proposed_alternative
          ? `<div class="finding-alt">
              <span class="finding-ai-tag">💡 AI suggestion — requires lawyer review:</span><br>
              ${esc(f.proposed_alternative)}
              ${f.legal_citations ? `<br><span style="font-size:11px;color:var(--text-muted)">${formatCitations(f.legal_citations)}</span>` : ''}
            </div>`
          : (f.grounding_status === 'ungrounded' && f.severity !== 'low'
              ? `<div class="finding-ungrounded">⚠ Альтернатива не обґрунтована — правова база не знайдена</div>` : '');

        html += `<div class="finding-card">
          <div class="finding-header">
            <span class="finding-ref">${esc(f.clause_ref)}</span>
            <span class="sev sev-${f.severity}">${f.severity}</span>
            <span style="font-size:11px;color:var(--text-muted)">${catLabel(f.category)}</span>
            <span style="font-size:11px;color:var(--text-dim)">${esc(f.doc_name||'')}</span>
          </div>
          <div class="finding-note">${esc(f.short_note)}</div>
          ${f.monetary_exposure_uah ? `<div style="font-size:12px;color:var(--sev-high);margin-bottom:8px">≈ ${Number(f.monetary_exposure_uah).toLocaleString('uk-UA')} грн</div>` : ''}
          ${altHtml}
          <div class="finding-actions">
            <select class="form-input" style="width:auto;padding:4px 8px;font-size:11px" onchange="updateFindingState(${f.id}, this.value)">
              ${stateOptions(f.workflow_state)}
            </select>
          </div>
        </div>`;
      });
    } else if (docs.some(d => d.analyzed_at)) {
      html += `<div class="empty-state" style="padding:30px 0">Ризиків не виявлено</div>`;
    }

    html += `<div class="disclaimer">Автоматичний аналіз Solomon. Підлягає перевірці юристом. Не є юридичною консультацією.</div>`;
    root.innerHTML = html;

    // Inline upload panel
    window._uploadEid = eid;
  } catch(e) {
    root.innerHTML = errorHtml(e.message);
  }
}

async function renderBuyerProfiles() {
  const root = document.getElementById('contracts-root');
  root.innerHTML = loadingHtml('Завантаження профілів…');
  try {
    const r = await fetch('/api/contracts/buyers');
    const buyers = await r.json();
    let html = `<div class="section-header">
      <div class="section-title">Профілі покупців</div>
      <button class="btn btn-secondary btn-sm" onclick="navigateTo('list')">← Назад</button>
    </div>`;
    if (!buyers.length) html += `<div class="empty-state">Профілів немає</div>`;
    else {
      buyers.forEach(b => {
        html += `<div class="doc-list-item">
          <div><div class="doc-name">${esc(b.buyer_name)}</div>
          <div class="doc-type">${esc(b.legal_entity||'')} ${b.edrpou ? '· ЄДРПОУ ' + esc(b.edrpou) : ''}</div></div>
        </div>`;
      });
    }
    root.innerHTML = html;
  } catch(e) { root.innerHTML = errorHtml(e.message); }
}

async function renderEvalPage() {
  const root = document.getElementById('contracts-root');
  root.innerHTML = loadingHtml('Завантаження оцінки…');
  try {
    const r = await fetch('/api/contracts/admin/eval');
    const data = await r.json();
    const c = data.counts || {};
    const prec = data.precision != null ? (data.precision * 100).toFixed(1) + '%' : 'N/A';
    let html = `<div class="section-header">
      <div class="section-title">Eval Harness — §13</div>
      <button class="btn btn-secondary btn-sm" onclick="navigateTo('list')">← Назад</button>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val">${prec}</div><div class="kpi-label">Precision</div></div>
      <div class="kpi"><div class="kpi-val">${c.true_positive||0}</div><div class="kpi-label">True Positive</div></div>
      <div class="kpi"><div class="kpi-val">${c.false_positive||0}</div><div class="kpi-label">False Positive</div></div>
      <div class="kpi"><div class="kpi-val">${c.wrong_category||0}</div><div class="kpi-label">Wrong Category</div></div>
    </div>`;
    if (data.judgments?.length) {
      html += `<div class="section-title" style="font-size:15px;margin:20px 0 12px">Оцінки</div>`;
      data.judgments.forEach(j => {
        html += `<div class="doc-list-item">
          <div><div class="doc-name">${esc(j.clause_ref)} · <span class="sev sev-${j.severity}">${j.severity}</span></div>
          <div class="doc-type">${esc(j.short_note?.slice(0,80)||'')}</div></div>
          <div class="sev sev-${j.judgment==='true_positive'?'low':'critical'}">${j.judgment}</div>
        </div>`;
      });
    }
    html += `<div class="disclaimer">Targets: Precision ≥ 0.75 · Recall ≥ 0.70 · Clause-ref accuracy = 1.0 · Grounding rate ≥ 0.60</div>`;
    root.innerHTML = html;
  } catch(e) { root.innerHTML = errorHtml(e.message); }
}

// ══════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════

async function createEngagement() {
  const name = document.getElementById('eng-name').value.trim();
  if (!name) { alert('Введіть назву справи'); return; }
  const body = {
    name, counterparty_name: document.getElementById('eng-counterparty').value.trim(),
    our_entity: document.getElementById('eng-entity').value.trim(),
    engagement_date: document.getElementById('eng-date').value || null,
  };
  const r = await fetch('/api/contracts/engagements', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (!r.ok) { alert('Помилка створення'); return; }
  const data = await r.json();
  closeModal('new-eng-modal');
  navigateTo('e/' + data.id);
}

function openUploadPanel(eid) {
  const root = document.getElementById('contracts-root');
  const existing = document.getElementById('upload-panel');
  if (existing) { existing.remove(); return; }
  const panel = document.createElement('div');
  panel.id = 'upload-panel';
  panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--gold);padding:20px 32px;z-index:50;box-shadow:0 -8px 32px #0d152820';
  panel.innerHTML = `<div style="max-width:600px;margin:0 auto">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <span style="font-weight:600;color:var(--navy)">Завантажити документ</span>
      <span style="cursor:pointer;color:var(--text-muted)" onclick="this.parentElement.parentElement.parentElement.remove()">✕</span>
    </div>
    <input type="file" id="upload-file" accept=".doc,.docx,.pdf,.xls,.xlsx,.zip" style="margin-bottom:10px;width:100%">
    <input class="form-input" id="upload-prefix" placeholder="Префікс додатку (напр. Дод.1)" style="margin-bottom:10px">
    <button class="btn btn-primary" style="width:100%" onclick="doUpload(${eid})">Завантажити</button>
    <div id="upload-status" style="margin-top:8px;font-size:12px;color:var(--text-muted)"></div>
  </div>`;
  document.body.appendChild(panel);
}

async function doUpload(eid) {
  const fileInput = document.getElementById('upload-file');
  const prefix = document.getElementById('upload-prefix').value;
  const status = document.getElementById('upload-status');
  if (!fileInput.files.length) { alert('Оберіть файл'); return; }
  status.textContent = 'Завантаження…';
  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  fd.append('appendix_prefix', prefix);
  const r = await fetch('/api/contracts/engagements/' + eid + '/upload', { method:'POST', body:fd });
  if (!r.ok) { status.textContent = 'Помилка: ' + r.statusText; return; }
  const data = await r.json();
  status.textContent = `Завантажено ${data.created.length} документ(ів)`;
  setTimeout(() => { document.getElementById('upload-panel')?.remove(); renderEngagementWorkspace(eid); }, 1000);
}

async function startAnalysis(eid) {
  const r = await fetch('/api/contracts/engagements/' + eid + '/analyze', { method:'POST' });
  if (!r.ok) { alert('Помилка запуску аналізу'); return; }
  const data = await r.json();
  alert(`Аналіз розпочато для ${data.document_count} документ(ів). Зачекайте 60-120 сек і оновіть сторінку.`);
}

async function updateFindingState(fid, state) {
  await fetch('/api/contracts/findings/' + fid + '/state', {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ workflow_state: state })
  });
}

async function downloadRiskNote(eid) {
  window.open('/api/contracts/engagements/' + eid + '/risk-note.docx', '_blank');
}

async function genOpinion(eid) {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Генерація…';
  const r = await fetch('/api/contracts/engagements/' + eid + '/legal-opinion', { method:'POST' });
  btn.disabled = false; btn.textContent = 'Правовий висновок';
  if (!r.ok) { alert('Помилка генерації'); return; }
  const data = await r.json();
  window.open('/api/contracts/engagements/' + eid + '/legal-opinion/' + data.version + '.docx', '_blank');
}

// ══════════════════════════════════════════════════════════════
//  MODAL HELPERS
// ══════════════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-backdrop').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ══════════════════════════════════════════════════════════════
//  RENDERING HELPERS
// ══════════════════════════════════════════════════════════════
function loadingHtml(msg) {
  return `<div class="status"><div class="loading-dots"><span></span><span></span><span></span></div><div class="status-label">${msg}</div></div>`;
}
function errorHtml(msg) { return `<div class="error-msg">⚠ ${esc(msg)}</div>`; }
function authPromptHtml() {
  return `<div style="max-width:360px;margin:60px auto">
    <div class="modal-title" style="margin-bottom:20px">Вхід у Соломон · Договори</div>
    <div class="form-row">
      <label class="form-label">Логін</label>
      <input class="form-input" id="login-user" placeholder="solomon" autocomplete="username">
    </div>
    <div class="form-row">
      <label class="form-label">Пароль</label>
      <input class="form-input" id="login-pass" type="password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">Увійти</button>
    <div id="login-error" style="color:var(--accent-red);font-size:12px;margin-top:8px;display:none">Невірні дані</div>
  </div>`;
}

function doLogin() {
  const u = (document.getElementById('login-user')?.value || '').trim();
  const p = (document.getElementById('login-pass')?.value || '').trim();
  if (!u || !p) return;
  const token = btoa(u + ':' + p);
  document.cookie = 'solcon_auth=' + token + '; path=/; SameSite=Lax';
  renderContractsList();
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('uk-UA') : '—'; }

function statusBadge(s) {
  return `<span class="status-badge status-${s||'triage'}">${statusLabel(s)}</span>`;
}
function statusLabel(s) {
  const m = {triage:'Огляд',under_review:'Аналіз',protocol_drafted:'Протокол готовий',
    protocol_sent:'Протокол надіслано',counterparty_responded:'Відповідь отримана',
    agreed:'Узгоджено',declined:'Відхилено',archived:'Архів'};
  return m[s] || s;
}
function catLabel(c) {
  const m = {penalty:'Штрафи',payment_terms:'Оплата',liability_shift:'Відповідальність',
    ip_rights:'ІВ',force_majeure:'Форс-мажор',termination:'Розірвання',
    returns_refusal:'Повернення',audit_rights:'Аудит',set_off:'Залік вимог',
    tax_invoicing:'Податкова накл.',quality_acceptance:'Якість',
    delivery_terms:'Доставка',other:'Інше'};
  return m[c] || c;
}
function docTypeLabel(t) {
  const m = {main_contract:'Договір поставки',additional_agreement:'Додаткова угода',
    commercial_code:'Кодекс',specification:'Специфікація',price_list:'Прайс',
    risks_note:'Ризики',legal_opinion:'Правовий висновок',
    protocol_draft:'Протокол (чернетка)',protocol_returned:'Протокол (відповідь)',
    protocol_agreed:'Протокол (узгоджений)',other:'Інше'};
  return m[t] || t;
}
function stateOptions(current) {
  const opts = [
    ['triage','Огляд'],['included_in_protocol','До протоколу'],['excluded','Виключити'],
    ['sent_to_counterparty','Надіслано контрагенту'],['counterparty_accepted','Прийнято'],
    ['counterparty_rejected','Відхилено контрагентом'],['agreed','Узгоджено'],
  ];
  return opts.map(([v,l]) => `<option value="${v}" ${v===current?'selected':''}>${l}</option>`).join('');
}
function formatCitations(citsJson) {
  try {
    const cits = typeof citsJson === 'string' ? JSON.parse(citsJson) : citsJson;
    if (!cits?.length) return '';
    return cits.map(c => `<a href="${esc(c.official_url)}" target="_blank" style="color:var(--navy-light)">${esc(c.article_ref||c.source_title)}</a>`).join(' · ');
  } catch { return ''; }
}

// ══════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════
(function init() {
  const tab = new URLSearchParams(window.location.search).get('tab') || 'court';
  document.getElementById('tab-court').classList.toggle('active', tab === 'court');
  document.getElementById('tab-contracts').classList.toggle('active', tab === 'contracts');
  document.getElementById('tab-court-btn').classList.toggle('active', tab === 'court');
  document.getElementById('tab-contracts-btn').classList.toggle('active', tab === 'contracts');
  if (tab === 'contracts') {
    const view = new URLSearchParams(window.location.search).get('view') || 'list';
    _currentView = view;
    renderContractsView(view);
  }
})();
</script>
